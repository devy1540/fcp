name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate semantic version tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "unsupported release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - run: go test -count=1 ./...
      - run: go test -count=1 -race ./...
      - run: go vet ./...

  binaries:
    name: Publish signed release assets
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Build archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          RELEASE_VERSION="${VERSION#v}"
          for GOOS in darwin linux; do
            for GOARCH in amd64 arm64; do
              ARCHIVE="fcp_${RELEASE_VERSION}_${GOOS}_${GOARCH}"
              mkdir -p "dist/$ARCHIVE"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -ldflags="-s -w -X main.version=$VERSION" \
                -o "dist/$ARCHIVE/fcp" ./cmd/fcp
              cp LICENSE README.md "dist/$ARCHIVE/"
              tar -C dist -czf "dist/$ARCHIVE.tar.gz" "$ARCHIVE"
              rm -r "dist/$ARCHIVE"
            done
          done
          cd dist
          sha256sum ./*.tar.gz > checksums.txt
      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "FCP $GITHUB_REF_NAME"

  image:
    name: Publish multi-architecture image
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Attest image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
